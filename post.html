    </footer>

    <script>
    (async function() {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get('slug');
        if (!slug) {
            document.getElementById('post-content').textContent = 'No post specified.';
            return;
        }

        try {
            var results = await Promise.all([
                fetch('data/posts.json'),
                fetch('posts/' + slug + '.md')
            ]);
            var metaRes = results[0];
            var mdRes = results[1];

            if (!mdRes.ok) {
                document.getElementById('post-content').textContent = 'Post not found.';
                return;
            }

            var posts = await metaRes.json();
            var md = await mdRes.text();
            var meta = posts.find(function(p) { return p.slug === slug; });

            if (meta) {
                document.getElementById('post-title').textContent = meta.title;
                var d = new Date(meta.date + 'T00:00:00');
                var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                document.getElementById('post-date').textContent = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
                document.title = meta.title + ' \u2014 Sida Liu';
            }

            document.getElementById('post-content').innerHTML = marked.parse(md);
        } catch (e) {
            document.getElementById('post-content').textContent = 'Error loading post.';
        }
    })();
    </script>
</body>
</html>
